<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Xaze TikTok Downloader</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* GANTI BACKGROUND URL FOTO LO DI SINI */
        body {
            background-image: url('https://c.termai.cc/i184/O6R2.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        /* Overlay biar konten kebaca */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: -1;
        }

        /* KOTAK UTAMA */
        .container {
            max-width: 550px;
            width: 100%;
            margin: 0 auto;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 32px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(2px);
        }

        /* IMAGE ATAS (LO BISA GANTI URL NYA) */
        .header-image {
            width: 100%;
            border-radius: 24px;
            margin-bottom: 20px;
            object-fit: cover;
            height: 120px;
        }

        .title {
            text-align: center;
            margin-bottom: 20px;
        }

        .title h2 {
            font-size: 1.6rem;
            color: #1a1a1a;
        }

        .title p {
            color: #666;
            font-size: 0.8rem;
            margin-top: 5px;
        }

        /* INPUT GROUP */
        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
        }

        .input-group input {
            flex: 1;
            padding: 14px 18px;
            border-radius: 50px;
            border: 1px solid #ddd;
            background: #fff;
            font-size: 0.9rem;
            outline: none;
        }

        .input-group input:focus {
            border-color: #e07c3c;
        }

        .input-group button {
            padding: 0 24px;
            border-radius: 50px;
            border: none;
            background: #e07c3c;
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.85rem;
            min-width: 110px;
            transition: 0.2s;
        }

        .input-group button:active {
            transform: scale(0.96);
        }

        /* LOADER */
        .loader {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid #ddd;
            border-top-color: #e07c3c;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* RESULT AREA */
        .result-area {
            margin-top: 20px;
            display: none;
        }

        video {
            width: 100%;
            border-radius: 20px;
            margin-bottom: 12px;
            background: #000;
        }

        .download-btn {
            display: block;
            width: 100%;
            text-align: center;
            background: #27ae60;
            color: white;
            padding: 12px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            border: none;
            cursor: pointer;
        }

        .download-btn:active {
            transform: scale(0.98);
        }

        .error-msg {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 20px;
            text-align: center;
            font-size: 0.85rem;
        }

        .info {
            font-size: 0.7rem;
            color: #888;
            text-align: center;
            margin-top: 15px;
        }

        footer {
            text-align: center;
            margin-top: 15px;
            color: rgba(255,255,255,0.7);
            font-size: 0.7rem;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <!-- GANTI URL GAMBAR LO DI SINI (src=) -->
        <img src="https://c.termai.cc/i165/tKyRU.jpg" alt="header" class="header-image" id="headerImage">

        <div class="title">
            <h2>XAZE • DL TIKTOK PREMIUM</h2>
            <p>Downloader • No Watermark • Cepat</p>
        </div>

        <div class="input-group">
            <input type="text" id="urlInput" placeholder="Masukkan link TikTok...">
            <button id="actionBtn">GET MEDIA</button>
        </div>

        <div class="loader" id="loader">
            <div class="spinner"></div>
            <span>Sabar Cuk...</span>
        </div>

        <div class="result-area" id="resultArea"></div>
        <div class="info">⚡ Support TikTok video • Tanpa watermark</div>
    </div>
    <footer>
        🧠 Developed by <strong>FIKRI.Z</strong> | 2026 </strong> Sungai Mandan.
    </footer>
</div>

<script>
    const API_URL = "https://api-faa.my.id/faa/tiktok";
    const urlInput = document.getElementById('urlInput');
    const actionBtn = document.getElementById('actionBtn');
    const loader = document.getElementById('loader');
    const resultArea = document.getElementById('resultArea');

    let currentVideoUrl = null;

    function showLoader(show) {
        loader.style.display = show ? 'block' : 'none';
    }

    function showError(msg) {
        resultArea.style.display = 'block';
        resultArea.innerHTML = `<div class="error-msg">⚠️ ${msg}</div>`;
    }

    async function processTikTok() {
        const url = urlInput.value.trim();
        if (!url) {
            showError("Masukkan link TikTok dulu bree!");
            return;
        }

        showLoader(true);
        resultArea.style.display = 'none';
        resultArea.innerHTML = '';
        actionBtn.disabled = true;

        try {
            const response = await fetch(`${API_URL}?url=${encodeURIComponent(url)}`);
            const data = await response.json();
            console.log("API Response:", data);

            const isSuccess = data.status === "benar" || data.status === true;
            if (!isSuccess) {
                throw new Error("Gagal fetch data. Cek link lagi.");
            }

            const result = data.hasil || data.result;
            
            // Ambil video tanpa watermark
            let videoUrl = null;
            let title = result?.title || "TikTok Video";
            
            if (result?.alternatives?.nowm_hd) {
                videoUrl = result.alternatives.nowm_hd;
            } else if (result?.alternatives?.nowm) {
                videoUrl = result.alternatives.nowm;
            } else if (result?.data) {
                videoUrl = result.data;
            } else if (result?.video) {
                videoUrl = result.video;
            } else if (typeof result === 'string') {
                videoUrl = result;
            }

            if (!videoUrl) {
                throw new Error("Tidak menemukan link video.");
            }

            currentVideoUrl = videoUrl;
            
            // Tampilkan preview + tombol download
            resultArea.style.display = 'block';
            resultArea.innerHTML = `
                <video controls src="${videoUrl}" poster="${result?.cover || ''}"></video>
                <button class="download-btn" id="downloadBtn">⬇️ DOWNLOAD VIDEO</button>
                <div style="margin-top: 10px; font-size: 0.7rem; color: #888;">${title.substring(0, 80)}</div>
            `;
            
            // Event buat tombol download
            const downloadBtn = document.getElementById('downloadBtn');
            downloadBtn.addEventListener('click', function() {
                // CARA DOWNLOAD YANG BENER BUAT WEBVIEW APK
                if (currentVideoUrl) {
                    // Pake link download biar gak lempar ke Chrome
                    const link = document.createElement('a');
                    link.href = currentVideoUrl;
                    link.download = 'xaze_video.mp4';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                }
            });
            
        } catch (err) {
            console.error(err);
            showError(err.message || "Terjadi kesalahan, coba lagi nanti.");
        } finally {
            showLoader(false);
            actionBtn.disabled = false;
        }
    }

    actionBtn.addEventListener('click', processTikTok);
    urlInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') processTikTok();
    });

    // GANTI GAMBAR HEADER SESUAI URL YANG LO MAU
    // CARI ELEMEN IMAGE TERUS GANTI SRC NYA
    const headerImg = document.getElementById('headerImage');
    // UDH GUE KASIH URL DI ATAS, LO TINGGAL GANTI AJA
    // headerImg.src = "URL_GAMBAR_LO";
</script>
</body>
</html>
