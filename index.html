<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Xaze TikTok Downloader | By Fikri.Z</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        body {
            background-image: url('https://c.termai.cc/i184/O6R2.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0);
            z-index: -1;
        }

        .container {
            max-width: 550px;
            width: 100%;
            margin: 0 auto;
        }

        .card {
            background: rgba(0, 0, 0, 0.55);
            border-radius: 32px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .header-image {
            width: 100%;
            border-radius: 24px;
            margin-bottom: 20px;
            object-fit: cover;
            height: 120px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .title {
            text-align: center;
            margin-bottom: 20px;
        }

        .title h2 {
            font-size: 1.6rem;
            color: #ffffff;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .title p {
            color: #cccccc;
            font-size: 0.8rem;
            margin-top: 5px;
        }

        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
        }

        .input-group input {
            flex: 1;
            padding: 14px 18px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(0,0,0,0.5);
            color: white;
            font-size: 0.9rem;
            outline: none;
        }

        .input-group input::placeholder {
            color: rgba(255,255,255,0.6);
        }

        .input-group input:focus {
            border-color: #e07c3c;
        }

        .input-group button {
            padding: 0 24px;
            border-radius: 50px;
            border: none;
            background: #e07c3c;
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.85rem;
            min-width: 120px;
            transition: 0.2s;
        }

        .input-group button:active {
            transform: scale(0.96);
        }

        .loader {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: #e07c3c;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loader span {
            color: #cccccc;
        }

        .result-area {
            margin-top: 20px;
            display: none;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            background: #000;
            margin-bottom: 15px;
        }

        video {
            width: 100%;
            display: block;
        }

        .caption-detail {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            border-radius: 20px;
            padding: 15px;
            margin: 15px 0;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .caption-title {
            font-weight: 700;
            font-size: 0.9rem;
            margin-bottom: 8px;
            color: #ffffff;
        }

        .caption-stats {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 10px 0;
            font-size: 0.75rem;
        }

        .caption-stats span {
            background: rgba(255,255,255,0.15);
            padding: 4px 10px;
            border-radius: 20px;
            color: #dddddd;
        }

        .author-info {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.15);
        }

        .author-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }

        .author-name {
            font-weight: 600;
            font-size: 0.85rem;
            color: #ffffff;
        }

        .author-info div div {
            color: #aaaaaa;
        }

        .download-btn {
            display: block;
            width: 100%;
            text-align: center;
            background: #27ae60;
            color: white;
            padding: 14px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            transition: 0.2s;
        }

        .download-btn:active {
            transform: scale(0.98);
        }

        .error-msg {
            background: rgba(198, 40, 40, 0.8);
            backdrop-filter: blur(4px);
            color: #ffffff;
            padding: 12px;
            border-radius: 20px;
            text-align: center;
            font-size: 0.85rem;
        }

        .info {
            font-size: 0.7rem;
            color: #cccccc;
            text-align: center;
            margin-top: 15px;
        }

        footer {
            text-align: center;
            margin-top: 15px;
            color: rgba(255,255,255,0.6);
            font-size: 0.7rem;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <img src="https://c.termai.cc/i165/tKyRU.jpg" alt="header" class="header-image" id="headerImage">

        <div class="title">
            <h2>XAZE DOWNLOADER | PREMIUM</h2>
            <p>Project gabut org mandan 🗿</p>
        </div>

        <div class="input-group" id="inputGroup">
            <input type="text" id="urlInput" placeholder="Masukkan link TikTok...">
            <button id="actionBtn">GET MEDIA</button>
        </div>

        <div class="loader" id="loader">
            <div class="spinner"></div>
            <span>Sabar Cuk...</span>
        </div>

        <div class="result-area" id="resultArea"></div>
        <div class="info">Version 1.7.3</div>
    </div>
    <footer>
        🧠 Developed by <strong>FIKRI.Z</strong> | ©2026 • Sungai Mandan
    </footer>
</div>

<script>
    // API NEXRAY BARU - GACOR!
    const API_URL = "https://api.nexray.eu.cc/downloader/tiktok";
    const urlInput = document.getElementById('urlInput');
    const actionBtn = document.getElementById('actionBtn');
    const inputGroup = document.getElementById('inputGroup');
    const loader = document.getElementById('loader');
    const resultArea = document.getElementById('resultArea');

    let currentVideoUrl = null;

    function showLoader(show) {
        loader.style.display = show ? 'block' : 'none';
    }

    function showError(msg) {
        resultArea.style.display = 'block';
        resultArea.innerHTML = `<div class="error-msg">⚠️ ${msg}</div>`;
    }

    // Format angka (ribuan jadi K)
    function formatNumber(num) {
        if (!num) return '0';
        if (typeof num === 'string') {
            if (num.includes('K')) return num;
            num = parseInt(num.replace(/[^0-9]/g, '')) || 0;
        }
        if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
        if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
        return num.toString();
    }

    async function processTikTok() {
        const url = urlInput.value.trim();
        if (!url) {
            showError("Masukkan link TikTok dulu bree!");
            return;
        }

        showLoader(true);
        resultArea.style.display = 'none';
        resultArea.innerHTML = '';
        actionBtn.disabled = true;

        try {
            const response = await fetch(`${API_URL}?url=${encodeURIComponent(url)}`);
            const data = await response.json();
            console.log("NexRay Response:", data);

            if (!data.status || !data.result) {
                throw new Error("Gagal fetch data. Cek link lagi.");
            }

            const result = data.result;
            
            // Ambil video tanpa watermark
            let videoUrl = null;
            if (result.data) {
                videoUrl = result.data;
            } else if (result.video) {
                videoUrl = result.video;
            } else if (result.download_url) {
                videoUrl = result.download_url;
            }

            if (!videoUrl) {
                throw new Error("Tidak menemukan link video.");
            }

            currentVideoUrl = videoUrl;

            // Siapin data caption
            const title = result.title || "TikTok Video";
            const stats = result.stats || {};
            const author = result.author || {};
            const music = result.music_info || {};
            const cover = result.cover || "";
            const duration = result.duration || "?";
            const takenAt = result.taken_at || "?";

            // Format statistik
            const views = formatNumber(stats.views);
            const likes = formatNumber(stats.likes);
            const comments = formatNumber(stats.comment);
            const shares = formatNumber(stats.share);
            const saves = formatNumber(stats.save);
            const downloads = formatNumber(stats.download);

            // Tampilkan hasil dengan caption detail + HILANGIN TOMBOL GET MEDIA
            resultArea.style.display = 'block';
            resultArea.innerHTML = `
                <div class="video-wrapper">
                    <video controls src="${videoUrl}" poster="${cover}"></video>
                </div>
                
                <div class="caption-detail">
                    <div class="caption-title">📝 ${escapeHtml(title.substring(0, 120))}${title.length > 120 ? '...' : ''}</div>
                    
                    <div class="caption-stats">
                        <span>👁️ ${views}</span>
                        <span>❤️ ${likes}</span>
                        <span>💬 ${comments}</span>
                        <span>↗️ ${shares}</span>
                        <span>📥 ${saves}</span>
                        <span>⬇️ ${downloads}</span>
                    </div>
                    
                    <div class="author-info">
                        ${author.avatar ? `<img src="${author.avatar}" class="author-avatar" onerror="this.style.display='none'">` : '<div style="width:40px;height:40px;background:rgba(255,255,255,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;">👤</div>'}
                        <div>
                            <div class="author-name">${escapeHtml(author.nickname || author.fullname || "Unknown")}</div>
                            <div style="font-size:0.65rem; color:#aaa;">@${escapeHtml(author.fullname || "user")}</div>
                        </div>
                    </div>
                    
                    ${music.title ? `<div style="margin-top:10px; font-size:0.7rem; color:#aaa;">🎵 ${escapeHtml(music.title)} - ${escapeHtml(music.author)}</div>` : ''}
                    
                    <div style="display: flex; justify-content: space-between; margin-top: 10px; font-size: 0.65rem; color:#aaa;">
                        <span>📅 ${takenAt}</span>
                        <span>⏱️ ${duration}</span>
                    </div>
                </div>
                
                <button class="download-btn" id="downloadBtn">⬇️ COMOT VIDEONYA</button>
            `;
            
            // HILANGKAN INPUT GROUP + BUTTON GET MEDIA
            inputGroup.style.display = 'none';
            
            // Event buat tombol download
            const downloadBtn = document.getElementById('downloadBtn');
            downloadBtn.addEventListener('click', function() {
                if (currentVideoUrl) {
                    const link = document.createElement('a');
                    link.href = currentVideoUrl;
                    link.download = 'xaze_tiktok.mp4';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                }
            });
            
        } catch (err) {
            console.error(err);
            showError(err.message || "Terjadi kesalahan, coba lagi nanti.");
            actionBtn.disabled = false;
        } finally {
            showLoader(false);
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    actionBtn.addEventListener('click', processTikTok);
    urlInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') processTikTok();
    });

    // GANTI GAMBAR HEADER SESUAI URL YANG LO MAU
    const headerImg = document.getElementById('headerImage');
    // headerImg.src = "URL_GAMBAR_LO";
</script>
</body>
</html>
